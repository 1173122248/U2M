# ====================================================================
# 009_UPSR_U2M_Train_x4_NoCoupling.yml
# 基于008的激进改进:
# 核心思想: 完全解耦U²M与SR网络,让U²M专注不确定性建模
# 
# 理论依据:
# 1. SR guidance (λ_sr>0) 导致PSNR↑但CLIPIQA↓ (008验证)
# 2. Heteroscedastic loss的data_term已提供足够信息流
# 3. σ应该是"诊断工具",不是"优化目标"
# 
# 预期效果:
# - σ的空间多样性 ↑ (专注于建模真实不确定性)
# - 感知质量 ↑ (不被PSNR约束拖累)
# - PSNR可能↓0.5dB (可接受的trade-off)
# ====================================================================

name: 009_UPSR_U2M_Train_x4_NoCoupling
model_target: basicsr.models.upsr_real_model.UPSRRealModel
scale: 4
num_gpu: 1
manual_seed: 0
queue_size: 160

use_u2m: true

# Dataset configuration
datasets:
  train:
    name: LSDIR
    type: RealESRGANDataset
    dataroot_gt: F:/ZZM/UPSR-main/basicsr/datasets/LSDIR
    meta_info_file: F:/ZZM/UPSR-main/basicsr/data/meta_info/meta_info_LSDIR.txt
    filename_tmpl: '{}'
    io_backend:
      type: disk

    mean: 0.5
    std: 0.5
    blur_kernel_size: 21
    kernel_list: ['iso', 'aniso', 'generalized_iso', 'generalized_aniso', 'plateau_iso', 'plateau_aniso']
    kernel_prob: [0.45, 0.25, 0.12, 0.03, 0.12, 0.03]
    sinc_prob: 0.1
    blur_sigma: [0.2, 3]
    betag_range: [0.5, 4]
    betap_range: [1, 2]

    blur_kernel_size2: 15
    kernel_list2: ['iso', 'aniso', 'generalized_iso', 'generalized_aniso', 'plateau_iso', 'plateau_aniso']
    kernel_prob2: [0.45, 0.25, 0.12, 0.03, 0.12, 0.03]
    sinc_prob2: 0.1
    blur_sigma2: [0.2, 1.5]
    betag_range2: [0.5, 4]
    betap_range2: [1, 2]

    final_sinc_prob: 0.8

    gt_size: 256
    rescale_gt: False
    crop_pad_size: 256
    use_hflip: True
    use_rot: True

    num_worker_per_gpu: 6
    batch_size_per_gpu: 8
    micro_batchsize: 8
    dataset_enlarge_ratio: 1
    prefetch_mode: cuda
    pin_memory: True
    persistent_workers: True

  val_1:
    name: Val_SR
    type: PairedImageDataset
    dataroot_gt: F:\ZZM\UPSR-main\basicsr/datasets/Val_SR/gt
    dataroot_lq: F:\ZZM\UPSR-main\basicsr/datasets/Val_SR/lq
    io_backend:
      type: disk
    batch_size: 32

  val_2:
    name: RealSet65
    type: SingleImageDataset
    dataroot_lq: F:\ZZM\UPSR-main\basicsr\datasets\RealSet65
    io_backend:
      type: disk

# Degradation settings
degradation:
  scale: 4
  resize_prob: [0.2, 0.7, 0.1]
  resize_range: [0.15, 1.5]
  gaussian_noise_prob: 0.5
  noise_range: [1, 30]
  poisson_scale_range: [0.05, 3]
  gray_noise_prob: 0.4
  jpeg_range: [30, 95]

  second_order_prob: 0.5
  second_blur_prob: 0.8
  resize_prob2: [0.3, 0.4, 0.3]
  resize_range2: [0.3, 1.2]
  gaussian_noise_prob2: 0.5
  noise_range2: [1, 25]
  poisson_scale_range2: [0.05, 2.5]
  gray_noise_prob2: 0.4
  jpeg_range2: [30, 95]

  gt_size: 256
  resize_back: False
  use_sharp: False

# Network configurations
network_g:
  target: basicsr.archs.swin_unet_arch.UNetModelSwin
  params:
    image_size: 64
    in_channels: 48
    model_channels: 160
    out_channels: 3
    attention_resolutions: [64, 32, 16, 8]
    dropout: 0
    channel_mult: [1, 2, 2, 4]
    num_res_blocks: [2, 2, 2, 2]
    conv_resample: True
    dims: 2
    use_fp16: False
    num_head_channels: 32
    use_scale_shift_norm: True
    resblock_updown: False
    swin_depth: 2
    swin_embed_dim: 192
    window_size: 8
    mlp_ratio: 4.
    cond_lq: True
    lq_size: 64
    num_feat: 128

network_u2m:
  in_channels: 6
  base_channels: 32
  num_encoder_blocks: 4
  use_attention: true
  decay_type: cosine
  decay_min_value: 0.0

# Diffusion configuration
diffusion:
  un: 0.1
  min_noise: 0.4
  target: models.script_util.create_gaussian_diffusion
  params:
    sf: 4
    schedule_name: exponential
    schedule_kwargs:
      power: 0.2
    etas_end: 0.99
    steps: 5
    min_noise_level: 0.2
    kappa: 2.5
    weighted_mse: False
    predict_type: xstart
    timestep_respacing:
    scale_factor: 1.0
    normalize_input: True
    latent_flag: False

network_mse:
  target: basicsr.archs.atd_real_arch.ATD
  ckpt:
    path: experiments/pretrained_models/atd_real.pth
    strict_load_mse: True
    param_key_mse: params_ema
  params:
    upscale: 4
    in_chans: 3
    img_size: 64
    embed_dim: 96
    depths: [6, 6, 6, 6]
    num_heads: [4, 4, 4, 4]
    window_size: 16
    category_size: 128
    num_tokens: 64
    reducted_dim: 8
    convffn_kernel_size: 7
    img_range: 1.
    mlp_ratio: 1
    upsampler: 'pixelshuffledirect'
    resi_connection: '1conv'
    use_checkpoint: False

# Path configuration
path:
  # ===== 关键决策: 从iter 2000重新开始 =====
  # 原因: 005的iter 2000已经是感知质量峰值
  # 目标: 在此基础上让U²M独立学习,不受SR guidance干扰
  pretrain_network_g: experiments/005_UPSR_U2M_Train_x4_Fixed/models/net_g_2000.pth
  strict_load_g: true
  pretrain_network_u2m: experiments/005_UPSR_U2M_Train_x4_Fixed/models/net_u2m_2000.pth
  strict_load_u2m: true
  resume_state: ~

# Training settings
train:
  use_fp16: True
  ema_decay: 0.999

  freeze_main_network: false
  joint_u2m_training: true

  optim_g:
    type: AdamW
    lr: !!float 1e-5
    weight_decay: 0

  optim_u2m:
    type: AdamW
    lr: !!float 1e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]

  # ============ 激进方案: 完全解耦 ============
  # 核心理念: "Let U²M be U²M"
  # - SR guidance = 0 (完全移除耦合)
  # - Diversity = 10 (强化独立学习能力)
  # - Heteroscedastic data_term提供唯一信息流
  u2m_loss_opt:
    lambda_reg: 0.0
    use_heteroscedastic: true
    use_sr_guidance: false  # ⚠️ 完全禁用SR guidance
    lambda_sr: 0.0          # ⚠️ 权重设为0
    sr_guidance_steps: 1
    lambda_diversity: 10.0  # ⚠️ 大幅增强diversity (从5.0翻倍)
  # ==========================================

  scheduler:
    type: MultiStepLR
    milestones: [5000, 10000, 15000]
    gamma: 0.5

  total_iter: 20000
  warmup_iter: 1000

  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

  perceptual_opt:
    lpips_weight: 0.5

# Validation settings
val:
  val_freq: !!float 2e3
  suffix: ~
  save_img: true
  save_uncertainty: true
  pbar: True
  desired_min_size: 64
  chop_size: 512
  chop_stride: 448
  chop_bs: 1
  noise_repeat: False
  
  metrics:
    psnr:
      fr: True
      better: higher
    ssim:
      fr: True
      better: higher
    lpips:
      fr: True
      better: lower
    niqe:
      fr: False
      better: lower
    clipiqa:
      fr: False
      better: higher
    musiq:
      fr: False
      better: higher

# Logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 2e3
  use_tb_logger: True
  wandb:
    project: ~
    resume_id: ~

# Distribution training settings
dist_params:
  backend: nccl
  port: 29500
